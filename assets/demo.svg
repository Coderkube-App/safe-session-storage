<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#05050a" flood-opacity="0.5"/>
    </filter>
    
    <!-- Background Gradient for Terminal -->
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d111c" />
      <stop offset="100%" stop-color="#070a12" />
    </linearGradient>

    <!-- Outer Glow for Ciphertext -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer background glow/vignette -->
  <rect width="100%" height="100%" fill="#0a0d16"/>
  <circle cx="380" cy="210" r="300" fill="#2563eb" opacity="0.12" filter="blur(80px)"/>

  <!-- Terminal Window with Shadow -->
  <rect x="30" y="30" width="700" height="360" rx="16" fill="url(#termGrad)" stroke="#1e293b" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Window Header / Titlebar -->
  <path d="M 30,46 A 16,16 0 0,1 46,30 L 714,30 A 16,16 0 0,1 730,46 L 730,70 L 30,70 Z" fill="#131927" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Window Buttons (Mac style) -->
  <circle cx="56" cy="50" r="6.5" fill="#ef4444"/>
  <circle cx="76" cy="50" r="6.5" fill="#f59e0b"/>
  <circle cx="96" cy="50" r="6.5" fill="#10b981"/>

  <!-- Terminal Title -->
  <text x="380" y="55" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="0.5">
    safe-session-storage - CLI Demo
  </text>

  <!-- Terminal Output / Text Content -->
  <g font-family="Fira Code, JetBrains Mono, Monaco, Consolas, Courier New, monospace" font-size="13.5" xml:space="preserve">
    <!-- Line 1: Welcome node REPL -->
    <text x="60" y="105" fill="#64748b">$ node</text>
    <text x="60" y="128" fill="#475569">Welcome to Node.js v20.11.0. (REPL)</text>

    <!-- Line 2: Import -->
    <text x="60" y="158" fill="#10b981">&gt;</text>
    <text x="78" y="158" fill="#c084fc" font-weight="bold">const</text>
    <text x="123" y="158" fill="#f8fafc"> { safeLocal } = </text>
    <text x="245" y="158" fill="#e2e8f0">require</text>
    <text x="295" y="158" fill="#f59e0b">('safe-session-storage')</text>
    <text x="475" y="158" fill="#f8fafc">;</text>

    <!-- Line 3: Set Item -->
    <text x="60" y="188" fill="#10b981">&gt;</text>
    <text x="78" y="188" fill="#38bdf8">safeLocal</text>
    <text x="147" y="188" fill="#f8fafc">.setItem(</text>
    <text x="212" y="188" fill="#fbbf24">'session_key'</text>
    <text x="303" y="188" fill="#f8fafc">, { userId: </text>
    <text x="393" y="188" fill="#fbbf24">'usr_9281'</text>
    <text x="477" y="188" fill="#f8fafc">, role: </text>
    <text x="532" y="188" fill="#fbbf24">'admin'</text>
    <text x="590" y="188" fill="#f8fafc"> });</text>

    <!-- Line 4: Comment 1 -->
    <text x="60" y="222" fill="#64748b" font-style="italic">// 1. Inspecting raw storage (anyone else looking at localStorage):</text>

    <!-- Line 5: Raw local storage get -->
    <text x="60" y="247" fill="#10b981">&gt;</text>
    <text x="78" y="247" fill="#f8fafc">localStorage.getItem(</text>
    <text x="238" y="247" fill="#fbbf24">'session_key'</text>
    <text x="329" y="247" fill="#f8fafc">);</text>

    <!-- Line 6: Raw storage value output (Encrypted!) -->
    <text x="78" y="272" fill="#f43f5e" filter="url(#glow)" font-weight="600">
      'U2FsdGVkX19V1/v6GvH/2s...c22b9RzHx42fA='
    </text>
    <text x="430" y="272" fill="#e11d48" font-size="11" font-weight="bold" letter-spacing="1">🔒 AES ENCRYPTED</text>

    <!-- Line 7: Comment 2 -->
    <text x="60" y="312" fill="#64748b" font-style="italic">// 2. Accessing securely via safe-session-storage wrapper:</text>

    <!-- Line 8: Secure get -->
    <text x="60" y="337" fill="#10b981">&gt;</text>
    <text x="78" y="337" fill="#38bdf8">safeLocal</text>
    <text x="147" y="337" fill="#f8fafc">.getItem(</text>
    <text x="212" y="337" fill="#fbbf24">'session_key'</text>
    <text x="303" y="337" fill="#f8fafc">);</text>

    <!-- Line 9: Decrypted output -->
    <text x="78" y="362" fill="#10b981" font-weight="bold">{ userId: 'usr_9281', role: 'admin' }</text>
  </g>
</svg>
